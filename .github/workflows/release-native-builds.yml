name: Build Native Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Tauri icons
        run: bun run tauri:icons

      - name: Build Windows bundle
        run: bunx tauri build --bundles nsis

      - name: Collect EXE artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\windows -Force | Out-Null
          Get-ChildItem -Path src-tauri\target\release\bundle -Filter *.exe -Recurse | Copy-Item -Destination dist\windows -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/windows/*.exe
          if-no-files-found: error

  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust (Android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Configure Android SDK env
        run: |
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "/usr/local/lib/android/sdk/platform-tools" >> "$GITHUB_PATH"

      - name: Accept Android SDK licenses (non-interactive)
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install required Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973" \
            "cmdline-tools;latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Tauri icons
        run: bun run tauri:icons

      - name: Initialize Android project
        run: bunx tauri android init --ci

      - name: Build Android APK
        run: bunx tauri android build --apk --target aarch64

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Sign APK
        run: |
          APK_PATH=$(find src-tauri -type f -name "*.apk" | head -1)
          mkdir -p dist/android
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out dist/android/agentstudio.apk \
            "$APK_PATH"

      - name: Verify APK signature
        run: $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose dist/android/agentstudio.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/android/agentstudio.apk
          if-no-files-found: error

  attach-assets-to-release:
    name: Attach Artifacts to Release
    runs-on: ubuntu-latest
    needs: [build-windows-exe, build-android-apk]
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/android

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*.exe
            dist/android/*.apk
          fail_on_unmatched_files: true
